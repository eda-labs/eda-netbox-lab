apiVersion: netbox.eda.nokia.com/v1alpha1
kind: Instance
metadata:
  name: netbox
  namespace: eda-netbox
spec:
  url: http://netbox-server.netbox.svc.cluster.local/core/httpproxy/v1/netbox-ui
  apiToken: netbox-api-token
  signatureKey: netbox-webhook-signature
  disableWebhook: false
  sync:
    enabled: true
    region: eda
    tenant: eda
